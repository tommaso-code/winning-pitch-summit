<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Winning Pitch — GSA Summit 2026">
  <defs>
    <path id="topArc" d="M 66,200 A 134,134 0 0 1 334,200"/>
    <path id="botArc" d="M 70,200 A 130,130 0 0 0 330,200"/>
    <linearGradient id="ball" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3E86C4"/>
      <stop offset="1" stop-color="#1F5F9E"/>
    </linearGradient>
  </defs>

  <!-- rings -->
  <circle cx="200" cy="200" r="196" fill="#ffffff"/>
  <circle cx="200" cy="200" r="194" fill="none" stroke="#1F3864" stroke-width="9"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#2E75B6" stroke-width="3"/>
  <circle cx="200" cy="200" r="118" fill="none" stroke="#1F3864" stroke-width="2.5"/>
  <circle cx="200" cy="200" r="112" fill="#F4F8FC"/>

  <!-- curved text -->
  <text font-family="Arial, Helvetica, sans-serif" font-weight="800" fill="#1F3864"
        font-size="30" letter-spacing="3" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">THE WINNING PITCH</textPath>
  </text>
  <text font-family="Arial, Helvetica, sans-serif" font-weight="700" fill="#2E75B6"
        font-size="19" letter-spacing="2.5" text-anchor="middle">
    <textPath href="#botArc" startOffset="50%">GSA SUMMIT · BOSTON 2026</textPath>
  </text>

  <!-- side stars -->
  <g fill="#E0A82E">
    <path d="M 54,200 l 3.4,6.9 7.6,1.1 -5.5,5.4 1.3,7.6 -6.8,-3.6 -6.8,3.6 1.3,-7.6 -5.5,-5.4 7.6,-1.1 z"/>
    <path d="M 346,200 l 3.4,6.9 7.6,1.1 -5.5,5.4 1.3,7.6 -6.8,-3.6 -6.8,3.6 1.3,-7.6 -5.5,-5.4 7.6,-1.1 z"/>
  </g>

  <!-- soccer ball -->
  <g>
    <circle cx="190" cy="216" r="47" fill="url(#ball)" stroke="#ffffff" stroke-width="3"/>
    <!-- central pentagon -->
    <path d="M 190,198 L 207,210 L 200,231 L 180,231 L 173,210 Z" fill="#153E66"/>
    <!-- seams from pentagon vertices to rim -->
    <g stroke="#EAF2FA" stroke-width="3" stroke-linecap="round">
      <line x1="190" y1="198" x2="190" y2="171"/>
      <line x1="207" y1="210" x2="233" y2="202"/>
      <line x1="200" y1="231" x2="214" y2="255"/>
      <line x1="180" y1="231" x2="166" y2="255"/>
      <line x1="173" y1="210" x2="147" y2="202"/>
    </g>
  </g>

  <!-- winning shot: rising dotted trajectory to a gold star -->
  <path d="M 202,178 Q 244,150 256,126" fill="none" stroke="#E0A82E" stroke-width="4.5"
        stroke-linecap="round" stroke-dasharray="0.5 9"/>
  <path transform="translate(261,120)" fill="#E0A82E"
        d="M0,-13 L3.9,-4 13.2,-4 5.6,2.6 8.1,12 0,6.2 -8.1,12 -5.6,2.6 -13.2,-4 -3.9,-4 Z"/>
</svg>
